name: API Documentation

on:
  push:
    branches: [ "main", "master", "development", "feature/**", "release/**" ]
  pull_request:
    branches: [ "main", "master", "development" ]
  schedule:
    - cron: '5 2 * * *' # daily at 2:05

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dboeckli'

      - name: Install dependencies
        run: npm ci

      - name: Lint API documentation
        run: npm run test

      - name: Build API documentation
        run: npm run build

      - name: Update version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUMBER=${{ github.run_number }}
          TIMESTAMP=$(date -u +"%Y%m%d%H%M")
          BRANCH_NAME=${GITHUB_REF##*/}
          
          if [ "$BRANCH_NAME" = "development" ]; then
            NEW_VERSION="1.0.${BUILD_NUMBER}-dev.${SHORT_SHA}"
          else
            TIMESTAMP=$(date -u +"%Y%m%d%H%M")
            NEW_VERSION="0.1.${BUILD_NUMBER}-feature.${SHORT_SHA}.$(date -u +"%Y%m%d%H%M" | sed 's/^0*//;s/\.0*/./g')"
          fi
          echo "Generated version: $NEW_VERSION"
          
          # Ensure the version is semver-compliant
          NEW_VERSION=$(echo "$NEW_VERSION" | sed 's/[^0-9A-Za-z.+\-]/-/g')          
          echo "Generated version after sed: $NEW_VERSION"
          
          npm version "$NEW_VERSION" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          echo "New version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish artifact
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish
          echo ":maple_leaf: Published Version: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: dist/bundle.yaml
