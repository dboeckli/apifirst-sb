get:
  tags:
    -  Order
  summary: Get Order by id
  description: Get Order by id
  operationId: getOrderById
  parameters:
    - $ref: ../../components/parameters/order_id.yaml
  responses:
    '200':
      description: successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/order.yaml
    '400':
      description: Bad Request
    '404':
      description: Not Found

put:
  tags:
    -  Order
  summary: Update Order
  description: Update Order
  operationId: updateOrder
  parameters:
    - name: orderId
      in: path
      description: The ID of the order to retrieve
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/v1/order_update.yaml
  responses:
    '200':
      description: Order Created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/order.yaml
    '400':
      description: Bad Request

patch:
  tags:
    -  Order
  summary: Patch a order by ID
  description:  |
    Patch a order by ID
  operationId: patchOrderById
  parameters:
    - name: orderId
      in: path
      description: The ID of the order to update
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/v1/order_patch.yaml
  responses:
    '200':
      description: successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/order.yaml
    '400':
      description: Bad Request
    '404':
      description: Not Found