type: object
properties:
  id:
    type: string
    format: uuid
    description: A unique identifier for the customer.
    readOnly: true
  name:
    $ref: name.yaml
  shipToAddress:
    $ref: address.yaml
  billToAddress:
    $ref: address.yaml
  email:
    type: string
    format: email
    description: The customer's email address.
    example: dboeckli@gmail.com
  phone:
    type: string
    pattern: '^[+]?[(]?[0-9]{3}[)]?[-\s.]?[0-9]{3}[-\s.]?[0-9]{4,6}$'
    minLength: 7
    maxLength: 15
    description: The customer's phone number.
    example: +1 (123) 456-7890
  paymentMethods:
    type: array
    items:
      $ref: payment_method.yaml
required:
  - name
  - shipToAddress
  - billToAddress

