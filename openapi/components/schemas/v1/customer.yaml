type: object
properties:
  id:
    $ref: ../common/uuid_id.yaml
  name:
    $ref: name.yaml
  shipToAddress:
    $ref: address.yaml
  billToAddress:
    $ref: address.yaml
  email:
    type: string
    nullable: true
    format: email
    minLength: 5
    maxLength: 255
    description: The customer's email address.
    example: dboeckli@gmail.com
  phone:
    type: string
    nullable: true
    pattern: '^[+]?[(]?[0-9]{3}[)]?[-\s.]?[0-9]{3}[-\s.]?[0-9]{4,6}$'
    minLength: 7
    maxLength: 255
    description: The customer's phone number.
    example: +1 (123) 456-7890
  paymentMethods:
    type: array
    nullable: true
    items:
      $ref: payment_method.yaml
  dateCreated:
    $ref: ../common/iso_timestamp.yaml
  dateUpdated:
    $ref: ../common/iso_timestamp.yaml
required:
  - name
  - shipToAddress
  - billToAddress

