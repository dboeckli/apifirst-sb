type: object
properties:
  id:
    type: string
    format: uuid
    readOnly: true
    description: Unique identifier representing a specific address
  addressLine1:
    type: string
    minLength: 3
    maxLength: 100
    description: First line of the address
    example: 123 Main Street
  addressLine2:
    type:
      - string
      - 'null'
    minLength: 3
    maxLength: 100
    description: Second line of the address (optional)
  city:
    type: string
    minLength: 1
    maxLength: 100
    description: Name of the city
    example: New York
  state:
    type: string
    minLength: 2
    maxLength: 2
    description: State
    example: NY
  zip:
    type: string
    minLength: 4
    maxLength: 10
    description: Zip Code
    example: 10001
  dateCreated:
    $ref: ../common/iso_timestamp.yaml
  dateUpdated:
    $ref: ../common/iso_timestamp.yaml
required:
  - addressLine1
  - city
  - state
  - zip
